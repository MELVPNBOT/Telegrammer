<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MELVPN Messenger FIXED</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #161616; padding: 25px; border-radius: 12px; width: 350px; border: 1px solid #333; box-shadow: 0 10px 30px #000; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 6px; border: 1px solid #444; background: #222; color: #0f8; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-login { background: #0f8; color: #000; }
        .btn-reg { background: transparent; color: #0f8; border: 1px solid #0f8; }
        #chat-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; }
        .hidden { display: none; }
        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 6px; font-size: 0.9em; background: #222; }
    </style>
</head>
<body>

<div class="container" id="auth-form">
    <h2 style="text-align:center; color:#0f8;">MELVPN CHAT</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Пароль">
    <input type="password" id="prog-pass" placeholder="Пароль от проги">
    <button class="btn-login" onclick="handleAuth('login')">ВОЙТИ</button>
    <button class="btn-reg" onclick="handleAuth('register')">РЕГИСТРАЦИЯ</button>
</div>

<div class="container hidden" id="messenger">
    <h3 id="user-title" style="color:#0f8;"></h3>
    <div id="chat-box"></div>
    <div style="display:flex; gap: 5px;">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button style="width: 50px; background:#0f8;" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const GITHUB_TOKEN = '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';
    const REPO = 'MELVPNBOT/Telegrammer';
    let currentUser = null;

    // Чтение файла
    async function getFileData(path) {
        const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
        const res = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }
        });
        
        if (res.status === 404) return { content: [], sha: null };
        const data = await res.json();
        // Декодируем UTF-8 правильно
        const str = decodeURIComponent(escape(atob(data.content)));
        return { content: JSON.parse(str), sha: data.sha };
    }

    // Запись файла
    async function saveFileData(path, body, sha) {
        const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
        const payload = {
            message: "web update",
            content: btoa(unescape(encodeURIComponent(JSON.stringify(body, null, 2)))),
        };
        if (sha) payload.sha = sha;

        const res = await fetch(url, {
            method: 'PUT',
            headers: { 
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
            const err = await res.json();
            console.error("GitHub Error:", err);
            alert("Ошибка GitHub: " + err.message);
        }
        return res.ok;
    }

    async function handleAuth(type) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const progPass = document.getElementById('prog-pass').value.trim();

        if (!email || !pass || !progPass) return alert("Заполни всё!");

        console.log(`Запрос к ${type}...`);
        const { content: users, sha } = await getFileData('users.json');
        let user = users.find(u => u.email === email);

        if (type === 'register') {
            if (user) return alert("Юзер уже есть!");
            users.push({ email, pass, progPass, username: email.split('@')[0] });
            const success = await saveFileData('users.json', users, sha);
            if (success) alert("Регистрация OK! Нажми ВОЙТИ");
        } else {
            if (!user) return alert("Нет такого юзера!");
            if (user.pass === pass && user.progPass === progPass) {
                currentUser = user;
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('messenger').classList.remove('hidden');
                document.getElementById('user-title').innerText = `@${user.username}`;
                loadMessages();
                setInterval(loadMessages, 5000);
            } else {
                alert("Неверные пароли!");
            }
        }
    }

    async function loadMessages() {
        const { content: msgs } = await getFileData('messages.json');
        const box = document.getElementById('chat-box');
        box.innerHTML = msgs.map(m => `<div class="msg"><b>${m.user}:</b> ${m.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;
        
        const { content: msgs, sha } = await getFileData('messages.json');
        msgs.push({ user: currentUser.username, text });
        if (await saveFileData('messages.json', msgs, sha)) {
            input.value = '';
            loadMessages();
        }
    }
</script>
</body>
</html>
