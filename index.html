<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MELVPN Messenger</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 380px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { color: #00ff88; text-align: center; margin-bottom: 20px; font-size: 1.5em; }
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none; }
        input:focus { border-color: #00ff88; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-login { background: #00ff88; color: #000; }
        .btn-reg { background: #333; color: #00ff88; border: 1px solid #00ff88; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        #chat-box { height: 350px; overflow-y: auto; background: #141414; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; }
        .own { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        .hidden { display: none; }
        small { display: block; font-size: 0.7em; margin-bottom: 4px; color: #00ff88; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container" id="auth-form">
    <h2>MELVPN CHAT</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Пароль аккаунта">
    <input type="password" id="prog-pass" placeholder="Пароль от проги">
    <div class="btn-group">
        <button class="btn-login" onclick="handleAuth('login')">ВОЙТИ</button>
        <button class="btn-reg" onclick="handleAuth('register')">РЕГИСТРАЦИЯ</button>
    </div>
</div>

<div class="container hidden" id="messenger">
    <h3 id="user-title" style="color:#00ff88; margin-top:0;"></h3>
    <div id="chat-box"></div>
    <div style="display:flex; gap: 8px;">
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button style="width: 70px; background:#00ff88; color:#000;" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const GITHUB_TOKEN = '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';
    const REPO = 'MELVPNBOT/Telegrammer';
    let currentUser = null;

    async function githubApi(path, method = 'GET', body = null) {
        const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
        const headers = { 
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json',
            'Cache-Control': 'no-cache'
        };

        try {
            const res = await fetch(url, { headers });
            
            if (res.status === 404 && method === 'GET') {
                await fetch(url, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ message: "init", content: btoa("[]") })
                });
                return [];
            }

            const data = await res.json();
            if (method === 'GET') return JSON.parse(atob(data.content));

            if (method === 'PUT') {
                return fetch(url, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        message: "update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(body, null, 2)))),
                        sha: data.sha
                    })
                });
            }
        } catch (e) {
            console.error("Ошибка API:", e);
            return [];
        }
    }

    async function handleAuth(type) {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const progPass = document.getElementById('prog-pass').value.trim();

        if (!email || !pass || !progPass) return alert("Заполни все поля!");

        let users = await githubApi('users.json');
        let user = users.find(u => u.email === email);

        if (type === 'register') {
            if (user) return alert("Такой пользователь уже есть!");
            
            const newUser = { email, pass, progPass, username: email.split('@')[0] };
            users.push(newUser);
            await githubApi('users.json', 'PUT', users);
            alert("Регистрация завершена! Теперь нажми 'ВОЙТИ'");
        } 
        else if (type === 'login') {
            if (!user) return alert("Пользователь не найден!");
            
            if (user.pass === pass && user.progPass === progPass) {
                currentUser = user;
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('messenger').classList.remove('hidden');
                document.getElementById('user-title').innerText = `@${user.username}`;
                loadMessages();
                setInterval(loadMessages, 5000);
            } else {
                alert("Неверный пароль или ключ доступа!");
            }
        }
    }

    async function loadMessages() {
        const msgs = await githubApi('messages.json');
        const box = document.getElementById('chat-box');
        const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

        box.innerHTML = msgs.map(m => `
            <div class="msg ${m.user === currentUser.username ? 'own' : 'other'}">
                <small>${m.user}</small>
                <div>${m.text}</div>
            </div>
        `).join('');

        if (isAtBottom) box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const val = input.value.trim();
        if (!val) return;

        input.value = '';
        let msgs = await githubApi('messages.json');
        msgs.push({ user: currentUser.username, text: val, ts: Date.now() });
        await githubApi('messages.json', 'PUT', msgs);
        loadMessages();
    }
</script>
</body>
</html>
